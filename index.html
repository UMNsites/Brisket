<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brisket Battles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="p1-health">P1 HP: 100</div>
            <h1>BRISKET BATTLES</h1>
            <div id="p2-health">P2 HP: 100</div>
        </div>
        <div id="instructions">
            <p><b>Player 1 (Blue Butcher):</b> WASD to move, SPACE to swing Brisket</p>
            <p><b>Player 2 (Red Butcher):</b> Arrow Keys to move, ENTER to swing Brisket</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
